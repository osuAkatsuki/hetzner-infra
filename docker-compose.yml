services:
  # === osu! core services ===

  bancho-service-rs-api:
    image: osuakatsuki/bancho-service-rs:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/bancho-service-rs.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "5001"

  bancho-service-rs-pubsub-daemon:
    image: osuakatsuki/bancho-service-rs:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/bancho-service-rs.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "pubsub-daemon"

  score-service:
    image: osuakatsuki/score-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/score-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "7000"

  beatmaps-service:
    image: osuakatsuki/beatmaps-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/beatmaps-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8081"

  performance-service-api:
    image: osuakatsuki/performance-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/performance-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8665"

  performance-service-processor:
    image: osuakatsuki/performance-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/performance-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "processor"

  # === Web frontends ===

  hanayo:
    image: osuakatsuki/hanayo:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/hanayo.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "46221"

  akatsuki-api:
    image: osuakatsuki/akatsuki-api:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/akatsuki-api.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "40001"

  akatsuki-web:
    image: osuakatsuki/akatsuki-web:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/akatsuki-web.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "3000"

  admin-panel:
    image: osuakatsuki/admin-panel:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/admin-panel.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "8086"

  # === Internal services ===

  users-service:
    image: osuakatsuki/users-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/users-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8082"

  assets-service:
    image: osuakatsuki/assets-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/assets-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8083"

  payments-service:
    image: osuakatsuki/payments-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/payments-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8084"

  profile-history-service:
    image: osuakatsuki/profile-history-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/profile-history-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8085"

  nachalo-konca:
    image: osuakatsuki/nachalo-konca:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/nachalo-konca.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "amqp-processor"

  air-conditioning-service:
    image: osuakatsuki/air-conditioning-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/air-conditioning-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8088"

  rework-frontend:
    image: osuakatsuki/rework-frontend:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/rework-frontend.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "8089"

  # === Discord bots ===

  ai-discord-bot:
    image: osuakatsuki/ai-discord-bot:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/ai-discord-bot.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "bot"

  management-discord-bot:
    image: osuakatsuki/management-discord-bot:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/management-discord-bot.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "bot"

  # === Observability ===

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "3001"
      GF_SERVER_ROOT_URL: "https://grafana.akatsuki.gg"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.listen-address=:9090"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    network_mode: host
    command:
      - "--web.listen-address=:9100"

  # === Tools ===

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    network_mode: host
    environment:
      PMA_HOST: "127.0.0.1"
      PMA_PORT: "3306"
      APACHE_PORT: "8087"

  # === Non-Akatsuki ===

  travelplanner-api:
    image: osuakatsuki/travelplanner-api:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/travelplanner.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "8090"

  travelplanner-web:
    image: osuakatsuki/travelplanner-web:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/travelplanner-web.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "8091"

volumes:
  grafana-data:
  prometheus-data:
