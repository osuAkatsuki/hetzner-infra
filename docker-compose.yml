services:
  # === osu! core services ===

  bancho-service-rs-api:
    image: osuakatsuki/bancho-service-rs:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/bancho-service-rs.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "5001"

  bancho-service-rs-pubsub-daemon:
    image: osuakatsuki/bancho-service-rs:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/bancho-service-rs.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "pubsub-daemon"

  score-service:
    image: osuakatsuki/score-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/score-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "7000"

  beatmaps-service:
    image: osuakatsuki/beatmaps-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/beatmaps-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8081"

  performance-service-api:
    image: osuakatsuki/performance-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/performance-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8665"

  performance-service-processor:
    image: osuakatsuki/performance-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/performance-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "processor"

  # === Web frontends ===

  hanayo:
    image: osuakatsuki/hanayo:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/hanayo.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "46221"

  akatsuki-api:
    image: osuakatsuki/akatsuki-api:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/akatsuki-api.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "40001"

  # akatsuki-web: excluded — experimental SPA, not needed on Hetzner

  admin-panel:
    image: osuakatsuki/admin-panel:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/admin-panel.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8086"
    # TODO: fix port in admin-panel repo to read from env var
    entrypoint: ["bash", "-c", "sed -i 's/listen 80;/listen 8086;/g; s/listen \\[::\\]:80;/listen [::]:8086;/g' /etc/nginx/sites-enabled/admin_panel.conf /etc/nginx/sites-available/default /etc/nginx/nginx.conf && exec ./scripts/bootstrap.sh"]

  # === Internal services ===

  users-service:
    image: osuakatsuki/users-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/users-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8082"

  assets-service:
    image: osuakatsuki/assets-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/assets-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8083"

  payments-service:
    image: osuakatsuki/payments-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/payments-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8084"

  profile-history-service:
    image: osuakatsuki/profile-history-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/profile-history-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8085"

  nachalo-konca:
    image: osuakatsuki/nachalo-konca:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/nachalo-konca.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "amqp-processor"

  air-conditioning-service:
    image: osuakatsuki/air-conditioning-service:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/air-conditioning-service.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8088"

  rework-frontend:
    image: osuakatsuki/rework-frontend:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/rework-frontend.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "api"
      APP_PORT: "8089"

  # === Discord bots ===

  ai-discord-bot:
    image: osuakatsuki/ai-discord-bot:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/ai-discord-bot.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "bot"
    volumes:
      - ./env/ai-discord-bot.env:/srv/root/.env:ro

  management-discord-bot:
    image: osuakatsuki/management-discord-bot:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/management-discord-bot.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "bot"
    volumes:
      - ./env/management-discord-bot.env:/srv/root/.env:ro

  # === Observability ===

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "3001"
      GF_SERVER_ROOT_URL: "https://grafana.akatsuki.gg"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_DATABASE_TYPE: "mysql"
      GF_DATABASE_HOST: "127.0.0.1:3306"
      GF_DATABASE_NAME: "grafana"
      GF_DATABASE_USER: "grafana"
      GF_DATABASE_PASSWORD: "grafana-hetzner-2026"
      GF_INSTALL_PLUGINS: "redis-datasource"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.size=10GB"
      - "--storage.tsdb.min-block-duration=2h"
      - "--storage.tsdb.max-block-duration=2h"
      - "--web.listen-address=:9090"

  thanos-sidecar:
    image: thanosio/thanos:v0.41.0
    restart: unless-stopped
    network_mode: host
    volumes:
      - prometheus-data:/prometheus:ro
      - ./config/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
    command:
      - "sidecar"
      - "--tsdb.path=/prometheus"
      - "--prometheus.url=http://127.0.0.1:9090"
      - "--objstore.config-file=/etc/thanos/bucket.yml"
      - "--grpc-address=0.0.0.0:10901"
      - "--http-address=0.0.0.0:10902"

  thanos-store:
    image: thanosio/thanos:v0.41.0
    restart: unless-stopped
    network_mode: host
    user: "root"
    volumes:
      - ./config/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
      - thanos-store-data:/data
    command:
      - "store"
      - "--objstore.config-file=/etc/thanos/bucket.yml"
      - "--data-dir=/data"
      - "--grpc-address=0.0.0.0:10903"
      - "--http-address=0.0.0.0:10904"

  thanos-query:
    image: thanosio/thanos:v0.41.0
    restart: unless-stopped
    network_mode: host
    command:
      - "query"
      - "--endpoint=127.0.0.1:10901"
      - "--endpoint=127.0.0.1:10903"
      - "--http-address=0.0.0.0:10905"
      - "--grpc-address=0.0.0.0:10906"

  thanos-compactor:
    image: thanosio/thanos:v0.41.0
    restart: unless-stopped
    network_mode: host
    user: "root"
    volumes:
      - ./config/thanos/bucket.yml:/etc/thanos/bucket.yml:ro
      - thanos-compactor-data:/data
    command:
      - "compact"
      - "--objstore.config-file=/etc/thanos/bucket.yml"
      - "--data-dir=/data"
      - "--http-address=0.0.0.0:10907"
      - "--wait"
      - "--retention.resolution-raw=0d"
      - "--retention.resolution-5m=0d"
      - "--retention.resolution-1h=0d"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    network_mode: host
    command:
      - "--web.listen-address=:9100"

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    network_mode: host
    environment:
      WASABI_ACCESS_KEY: "${WASABI_ACCESS_KEY}"
      WASABI_SECRET_KEY: "${WASABI_SECRET_KEY}"
    volumes:
      - ./config/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/config.yml"
      - "-config.expand-env=true"

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp/promtail
    command:
      - "-config.file=/etc/promtail/config.yml"

  # === Tools ===

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    network_mode: host
    environment:
      PMA_HOST: "127.0.0.1"
      PMA_PORT: "3306"
      APACHE_PORT: "8087"

  # === Non-Akatsuki ===

  travelplanner-api:
    image: osuakatsuki/travelplanner-api:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/travelplanner.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_PORT: "8090"

  travelplanner-web:
    image: osuakatsuki/travelplanner-web:latest
    restart: unless-stopped
    network_mode: host
    env_file: env/travelplanner-web.env
    environment:
      PULL_SECRETS_FROM_VAULT: "0"
      APP_ENV: "production"
      APP_COMPONENT: "web"
      APP_PORT: "8091"
    volumes:
      - ./env/travelplanner-web.env:/usr/src/app/.env:ro
    # TODO: fix port in travelplanner-web repo to read from env var
    entrypoint: ["bash", "-c", "sed -i 's/listen 80/listen 8091/' /etc/nginx/conf.d/default.conf && exec ./entrypoint.sh"]

volumes:
  prometheus-data:
  thanos-compactor-data:
  thanos-store-data:
  loki-data:
  promtail-positions:
