server {
    listen 80;
    server_name next.akatsuki.gg next.staging.akatsuki.gg;

    location /api/ {
        limit_req zone=api_zone burst=10 nodelay;
        limit_req_status 429;

        add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'origin, content-type, accept' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        if ($request_method = OPTIONS) {
            return 200;
        }

        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://akatsuki_api;

        location /api/v2/profile-history {
            rewrite /api/v2/(.*) /api/v1/$1 break;
            proxy_pass http://profile_history_service;
        }

        location /api/v2/users {
            rewrite /api/v2/(.*) /public/api/v1/$1 break;
            proxy_pass http://users_service;
        }
    }

    location / {
        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://akatsuki_web;
    }
}
