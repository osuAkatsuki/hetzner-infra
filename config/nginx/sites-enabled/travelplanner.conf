map $http_user_agent $is_social_bot {
    default 0;
    ~*facebookexternalhit 1;
    ~*Twitterbot 1;
    ~*LinkedInBot 1;
    ~*Slackbot 1;
    ~*Discordbot 1;
    ~*WhatsApp 1;
    ~*TelegramBot 1;
}

server {
    listen 80;
    server_name travel.cmyui.xyz;

    location ~ ^/api/v1/(login|signup|logout|auth/) {
        limit_req zone=travelplanner_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://travelplanner_api;
    }

    location /api/v1 {
        limit_req zone=travelplanner_api burst=10 nodelay;
        limit_req_status 429;

        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://travelplanner_api;
    }

    # Social media crawlers get pre-rendered meta tags from the API
    # for link previews (Discord, Slack, Twitter, Facebook, etc.)
    location ~ ^/trips/[^/]+$ {
        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        if ($is_social_bot) {
            proxy_pass http://travelplanner_api;
        }

        proxy_pass http://travelplanner_web;
    }

    location / {
        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://travelplanner_web;
    }
}
