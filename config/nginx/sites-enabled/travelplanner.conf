server {
    listen 80;
    server_name travel.cmyui.xyz;

    location ~ ^/api/(login|signup|logout|auth/) {
        limit_req zone=travelplanner_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://travelplanner_api;
    }

    location /api {
        limit_req zone=travelplanner_api burst=10 nodelay;
        limit_req_status 429;

        rewrite ^/api/(.*)$ /$1 break;

        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://travelplanner_api;
    }

    location / {
        proxy_set_header X-Real-IP $http_CF_Connecting_IP;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;

        proxy_pass http://travelplanner_web;
    }
}
