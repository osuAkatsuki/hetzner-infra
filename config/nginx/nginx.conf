user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1000;
}

http {
    # basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 20M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    proxy_http_version 1.1;

    # logging
    log_format main '[$time_local] $http_CF_Connecting_IP - '
                    '"$request_method $host $uri" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    map $status $loggable {
        ~^[23] 1;
        default 1;
    }
    access_log /var/log/nginx/access.log main if=$loggable;
    error_log /var/log/nginx/error.log;

    # CORS origin allowlist
    map $http_origin $cors_allowed_origin {
        default "";
        "https://akatsuki.gg" "https://akatsuki.gg";
        "https://staging.akatsuki.gg" "https://staging.akatsuki.gg";
        "https://next.akatsuki.gg" "https://next.akatsuki.gg";
        "http://localhost:3000" "http://localhost:3000";
        "https://beatmap-checker.de" "https://beatmap-checker.de";
    }

    # WebSocket upgrade support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml application/atom+xml
               image/svg+xml font/ttf font/otf;

    # deny connections without a host header
    server {
        listen      80;
        server_name "";
        return      444;
    }

    # rate limiting zones
    limit_req_zone $http_CF_Connecting_IP zone=web_zone:10m rate=10r/s;
    limit_req_zone $http_CF_Connecting_IP zone=api_zone:10m rate=20r/s;
    limit_req_zone $http_CF_Connecting_IP zone=osu_zone:10m rate=20r/s;
    limit_req_zone $http_CF_Connecting_IP zone=beatmaps_zone:10m rate=10r/s;
    limit_req_zone $http_CF_Connecting_IP zone=users_zone:10m rate=10r/s;
    limit_req_zone $http_CF_Connecting_IP zone=password_resets_zone:10m rate=1r/m;
    limit_req_zone $http_CF_Connecting_IP zone=travelplanner_auth:1m rate=5r/m;
    limit_req_zone $http_CF_Connecting_IP zone=travelplanner_api:2m rate=10r/s;

    include /etc/nginx/sites-enabled/*.conf;
}
